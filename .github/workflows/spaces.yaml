name: Sync to Hugging Face hub (spaces)
on:
  push:
    branches: [spaces]

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://rdnfn:$HF_TOKEN@huggingface.co/spaces/rdnfn/icai spaces